<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
  <!-- Illes Balears — Three island shapes (Mallorca, Menorca, Eivissa) -->
  <!-- Mallorca (largest, center-left) -->
  <ellipse cx="9" cy="11" rx="4.5" ry="3.5"/>
  <!-- Menorca (medium, upper-right) -->
  <ellipse cx="17.5" cy="8" rx="3" ry="2"/>
  <!-- Eivissa + Formentera (small, lower-right) -->
  <ellipse cx="17" cy="16" rx="2" ry="1.5"/>
  <ellipse cx="18.5" cy="18.5" rx="1.2" ry="0.8"/>
</svg>
